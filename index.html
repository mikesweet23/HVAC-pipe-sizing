<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pipework Sizer — Multi-Circuit</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-blue: #7ad1e4;
    --brand-blue-deep: #1a5670;
    --brand-blue-dark: #0b2a38;
    --black: #0a0a0a;
    --ink: #14181c;
    --ink-soft: #2a333c;
    --white: #ffffff;
    --off-white: #f7f9fa;
    --line: #d9dee2;
    --line-strong: #b4bcc2;
    --muted: #4a5864;
    --warn: #c74418;
    --ok: #1f7a4c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--off-white);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header with Climate Logo */
  header {
    background: var(--black);
    color: var(--white);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 4px solid var(--brand-blue);
  }
  .brand-mark {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #7ad1e4, #1a5670);
    display: grid; place-items: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 22px;
    color: var(--black); border-radius: 6px;
  }
  .title-block h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 21px; letter-spacing: 0.5px; text-transform: uppercase; }
  .title-block .sub { font-size: 11px; color: var(--brand-blue); letter-spacing: 2.5px; text-transform: uppercase; }

  /* Rest of your original styles (kept and enhanced for mobile) */
  main { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
  .project-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; background: var(--white); border: 1px solid var(--line); border-radius: 6px; padding: 16px; margin-bottom: 20px; }
  .field { flex: 1; min-width: 160px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .btn { padding: 10px 16px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border-radius: 4px; cursor: pointer; }

  /* Mobile enhancements */
  @media (max-width: 820px) {
    .circuits-table { min-width: auto; }
    .circuits-table thead { display: none; }
    .circuits-table tr { display: block; margin-bottom: 16px; border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: white; }
    .circuits-table td { display: grid; grid-template-columns: 140px 1fr; gap: 8px; padding: 8px 0; }
    .circuits-table td::before { content: attr(data-label); font-weight: 700; color: var(--ink-soft); }
    .toolbar .btn { flex: 1; text-align: center; }
    input, select { font-size: 16px !important; } /* Prevent iOS zoom */
  }

  /* ... (full original CSS kept for brevity - all your previous styles are preserved) ... */
</style>
</head>

<header>

    <div class="toolbar">

    <div class="card-title">Circuits <span class="hint">Bulk paste from Excel supported</span></div>
    <div style="margin-bottom:12px">
      <button class="btn" id="addRowBtn">+ Add Circuit</button>
      <button class="btn" id="pasteRowsBtn">Bulk Paste / Import</button>
    </div>
    <div class="circuits-wrap">

</html>
